name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.2)'
        required: true
      targets:
        description: 'Build targets preset'
        required: true
        default: 'windows-amd64'
        type: choice
        options:
          - windows-amd64
          - linux-amd64
          - windows-linux-amd64

permissions:
  contents: write

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build matrix from UI selection
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail
          selection="${{ inputs.targets }}"

          case "$selection" in
            windows-amd64)
              matrix='{"include":[{"goos":"windows","goarch":"amd64","ext":".exe"}]}'
              ;;
            linux-amd64)
              matrix='{"include":[{"goos":"linux","goarch":"amd64","ext":""}]}'
              ;;
            windows-linux-amd64)
              matrix='{"include":[{"goos":"windows","goarch":"amd64","ext":".exe"},{"goos":"linux","goarch":"amd64","ext":""}]}'
              ;;
            *)
              echo "Unsupported target selection: $selection" >&2
              exit 1
              ;;
          esac

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "-s -w -X main.version=${{ inputs.version }}" \
            -o claude-sync-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/claude-sync
      - uses: actions/upload-artifact@v4
        with:
          name: claude-sync-${{ matrix.goos }}-${{ matrix.goarch }}
          path: claude-sync-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum claude-sync-* > checksums.txt
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ inputs.version }} \
            --repo ${{ github.repository }} \
            --title "claude-sync ${{ inputs.version }}" \
            --notes "Cross-platform build including Windows binaries." \
            claude-sync-* checksums.txt
